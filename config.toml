baseURL = "https://LuoHuilin3055.github.io/myblog/"
languageCode = "zh-cn"
title = "NGC 2237's Blog"
theme = "theme2"

[params]
  site_title = "NGC 2237"
  description = "欢迎来到NGC_2237的博客"
  author = "NGC 2237"
  featured_image = "/images/background.jpg"
  home_text = "何时葡萄会熟透，你要静候再静候"
  custom_404 = true
  
  # 个人资料卡片配置
  avatar = "/images/ChenJM.jpg"  # 头像图片路径
  bio = "Hi, there ~ 👋"  # 个性签名
  github = "https://github.com/LuoHuilin3055"  # GitHub 链接
  
  # 公告内容（支持 Markdown）
  announcement = """
虽然不知道你是怎么找到我的，但希望我能给你带来收获
"""
  
  # 网站统计（可选）
  visitor_count = 115  # 访客数
  page_views = 328     # 总浏览量

[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 10
  [[menu.main]]
    name = "Articles"
    url = "/posts/"
    weight = 20

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
      hardWraps = false
      xHTML = false
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = false
    noClasses = false
    style = "none"
    tabWidth = 4
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 6
    ordered = false
