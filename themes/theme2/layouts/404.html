<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>404 - 页面未找到 | NGC 2237's Blog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        .error-code {
            font-size: 8em;
            font-weight: bold;
            background: linear-gradient(135deg, #00ffff, #0066ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(0,255,255,0.3);
            margin-bottom: 20px;
            letter-spacing: 10px;
        }
        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #00ffff, transparent);
            margin: 0 auto 30px;
        }
        h1 {
            font-size: 2em;
            color: #fff;
            margin-bottom: 15px;
        }
        p {
            color: #aaa;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #00ffff, #0066ff);
            color: #000;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,255,255,0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,255,255,0.4);
        }
        .links {
            margin-top: 50px;
        }
        .links p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        .links a {
            color: #00ffff;
            text-decoration: none;
            margin: 0 15px;
            transition: color 0.3s;
        }
        .links a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="divider"></div>
        <h1>页面未找到</h1>
        <p>你访问的页面不存在或已被移除。<br>请检查网址是否正确，或返回首页查看更多内容。</p>
        <a href="/" class="btn">🏠 返回首页 →</a>
        <div class="links">
            <p>你可能感兴趣：</p>
            <a href="/about/">关于我</a>
            <a href="/posts/">所有文章</a>
        </div>
    </div>
</body>
</html>
