{{ define "main" }}
<div style="
  background: linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
  min-height: calc(100vh - 200px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 100px 20px;
">
  <div style="text-align: center; max-width: 600px;">
    <div style="
      font-size: 8em;
      font-weight: bold;
      background: linear-gradient(135deg, #00ffff, #0066ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 20px;
    ">
      404
    </div>
    
    <div style="
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, #00ffff, transparent);
      margin: 0 auto 30px;
    "></div>
    
    <h1 style="font-size: 2em; color: #fff; margin: 0 0 15px;">页面未找到</h1>
    
    <p style="color: #aaa; font-size: 1.1em; line-height: 1.6; margin-bottom: 40px;">
      你访问的页面不存在或已被移除。<br>
      请检查网址是否正确，或返回首页查看更多内容。
    </p>
    
    <a href="/" style="
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #00ffff, #0066ff);
      color: #000;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.1em;
    ">
      <span>🏠</span> 返回首页 <span>→</span>
    </a>
    
    <div style="margin-top: 50px;">
      <p style="color: #666; font-size: 0.9em;">你可能感兴趣：</p>
      <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
        <a href="/about/" style="color: #00ffff; text-decoration: none;">关于我</a>
        <a href="/posts/" style="color: #00ffff; text-decoration: none;">所有文章</a>
      </div>
    </div>
  </div>
</div>
{{ end }}
