{{ define "main" }}
<div style="
  background: linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  margin: 0;
  position: relative;
  overflow: hidden;
">
  <!-- 背景装饰 -->
  <div style="
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at center, rgba(0, 255, 255, 0.1) 0%, transparent 70%);
    animation: pulse 4s ease-in-out infinite;
  "></div>
  
  <div style="
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.9) 100%);
  "></div>
  
  <div style="text-align: center; max-width: 600px; position: relative; z-index: 1;">
    <div style="
      font-size: clamp(6em, 20vw, 12em);
      font-weight: bold;
      background: linear-gradient(135deg, #00ffff, #0066ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 20px;
      animation: fadeIn 1s ease-out;
    ">
      404
    </div>
    
    <div style="
      width: 120px;
      height: 4px;
      background: linear-gradient(90deg, #00ffff, transparent);
      margin: 0 auto 40px;
      animation: slideIn 1s ease-out 0.3s both;
    "></div>
    
    <h1 style="font-size: clamp(1.5em, 5vw, 2.5em); color: #fff; margin: 0 0 20px; animation: fadeIn 1s ease-out 0.5s both;">页面未找到</h1>
    
    <p style="color: #aaa; font-size: clamp(1em, 2vw, 1.2em); line-height: 1.6; margin-bottom: 50px; animation: fadeIn 1s ease-out 0.7s both;">
      你访问的页面不存在或已被移除。<br>
      请检查网址是否正确，或返回首页查看更多内容。
    </p>
    
    <a href="/" style="
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #00ffff, #0066ff);
      color: #000;
      text-decoration: none;
      padding: 15px 40px;
      border-radius: 40px;
      font-weight: bold;
      font-size: clamp(1em, 2vw, 1.2em);
      transition: all 0.3s ease;
      animation: fadeIn 1s ease-out 1s both;
    " onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 8px 25px rgba(0, 255, 255, 0.4)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">
      <span>🏠</span> 返回首页 <span>→</span>
    </a>
    
    <div style="margin-top: 60px; animation: fadeIn 1s ease-out 1.2s both;">
      <p style="color: #666; font-size: 0.9em; margin-bottom: 20px;">你可能感兴趣：</p>
      <div style="display: flex; gap: 30px; justify-content: center; flex-wrap: wrap;">
        <a href="/about/" style="color: #00ffff; text-decoration: none; transition: all 0.3s ease; padding: 8px 16px; border-radius: 20px;" onmouseover="this.style.background='rgba(0, 255, 255, 0.1)';" onmouseout="this.style.background='none';">关于我</a>
        <a href="/posts/" style="color: #00ffff; text-decoration: none; transition: all 0.3s ease; padding: 8px 16px; border-radius: 20px;" onmouseover="this.style.background='rgba(0, 255, 255, 0.1)';" onmouseout="this.style.background='none';">所有文章</a>
      </div>
    </div>
  </div>
  
  <style>
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes slideIn {
      from {
        width: 0;
      }
      to {
        width: 120px;
      }
    }
    
    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.3;
      }
      50% {
        transform: scale(1.1);
        opacity: 0.5;
      }
      100% {
        transform: scale(1);
        opacity: 0.3;
      }
    }
  </style>
</div>
{{ end }}
