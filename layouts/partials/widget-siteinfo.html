<!-- 网站信息 -->
<div style="
  background: #1a1d29;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  border: 1px solid #2a2d3a;
">
  <!-- 标题 -->
  <div style="
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
  ">
    <svg style="width: 20px; height: 20px; color: #3498db;" fill="currentColor" viewBox="0 0 24 24">
      <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.58 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
    </svg>
    <h4 style="
      color: #fff;
      font-size: 1.1em;
      margin: 0;
      font-weight: 500;
    ">网站信息</h4>
  </div>
  
  <!-- 信息列表 -->
  <div style="display: flex; flex-direction: column; gap: 12px;">
    <!-- 建站时间 -->
    <div style="
      display: flex;
      justify-content: space-between;
      align-items: center;
    ">
      <span style="color: #888; font-size: 0.9em;">建站时间：</span>
      <span style="color: #fff; font-size: 0.9em;">2026-03-21</span>
    </div>
    
    <!-- 文章数目 -->
    <div style="
      display: flex;
      justify-content: space-between;
      align-items: center;
    ">
      <span style="color: #888; font-size: 0.9em;">文章数目：</span>
      <span style="color: #fff; font-size: 0.9em;">{{ len (where .Site.RegularPages "Type" "posts") }}</span>
    </div>
    
    <!-- 总字数 -->
    <div style="
      display: flex;
      justify-content: space-between;
      align-items: center;
    ">
      <span style="color: #888; font-size: 0.9em;">本站总字数：</span>
      <span style="color: #fff; font-size: 0.9em;">
        {{ $totalWords := 0 }}
        {{ range where .Site.RegularPages "Type" "posts" }}
          {{ $totalWords = add $totalWords (partial "custom-wordcount.html" .) }}
        {{ end }}
        {{ $totalWords }}字
      </span>
    </div>
    
    <!-- 访客数 -->
    <div style="
      display: flex;
      justify-content: space-between;
      align-items: center;
    ">
      <span style="color: #888; font-size: 0.9em;">本站访客数：</span>
      <span id="busuanzi_value_site_uv" style="color: #fff; font-size: 0.9em;">统计中...</span>
    </div>
    
    <!-- 总浏览量 -->
    <div style="
      display: flex;
      justify-content: space-between;
      align-items: center;
    ">
      <span style="color: #888; font-size: 0.9em;">本站总浏览量：</span>
      <span id="busuanzi_value_site_pv" style="color: #fff; font-size: 0.9em;">统计中...</span>
    </div>
  </div>
</div>
