<div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
  <!-- 标签展示 -->
  <div>
    {{ if .Params.tags }}
    <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
      <span style="color: #888; font-size: 0.9em;">标签：</span>
      {{ range .Params.tags }}
        <a href="{{ "/tags/" | absURL }}{{ . | urlize }}" 
           style="
             padding: 6px 14px;
             background: rgba(0, 255, 255, 0.15);
             border: 1px solid rgba(0, 255, 255, 0.4);
             border-radius: 20px;
             color: #00ffff;
             font-size: 0.9em;
             text-decoration: none;
             transition: all 0.3s ease;
           "
           onmouseover="this.style.background='rgba(0, 255, 255, 0.3)'; this.style.transform='translateY(-2px)'"
           onmouseout="this.style.background='rgba(0, 255, 255, 0.15)'; this.style.transform='translateY(0)'">
          {{ . }}
        </a>
      {{ end }}
    </div>
    {{ end }}
  </div>
  
  <!-- 分享按钮 -->
  <div style="display: flex; gap: 10px;">
    <span style="color: #888; font-size: 0.9em;">分享：</span>
    <a href="https://twitter.com/intent/tweet?text={{ .Title }}&url={{ .Permalink }}" 
       target="_blank"
       style="
         padding: 6px 12px;
         background: #1da1f2;
         border-radius: 5px;
         color: #fff;
         font-size: 0.85em;
         text-decoration: none;
         transition: opacity 0.3s;
       "
       onmouseover="this.style.opacity='0.8'"
       onmouseout="this.style.opacity='1'">Twitter</a>
    <a href="https://www.facebook.com/sharer/sharer.php?u={{ .Permalink }}" 
       target="_blank"
       style="
         padding: 6px 12px;
         background: #4267B2;
         border-radius: 5px;
         color: #fff;
         font-size: 0.85em;
         text-decoration: none;
         transition: opacity 0.3s;
       "
       onmouseover="this.style.opacity='0.8'"
       onmouseout="this.style.opacity='1'">Facebook</a>
  </div>
</div>

<!-- 上一篇/下一篇导航 -->
{{ if or .PrevInSection .NextInSection }}
<div style="margin-top: 30px; padding-top: 30px; border-top: 1px solid #333;">
  <div style="display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap;">
    {{ with .PrevInSection }}
    <a href="{{ .RelPermalink }}" 
       style="
         flex: 1;
         min-width: 200px;
         padding: 15px 20px;
         background: rgba(0,0,0,0.5);
         border: 1px solid #333;
         border-radius: 10px;
         color: #fff;
         text-decoration: none;
         transition: all 0.3s ease;
       "
       onmouseover="this.style.borderColor='#00ffff'; this.style.background='rgba(0,255,255,0.1)'"
       onmouseout="this.style.borderColor='#333'; this.style.background='rgba(0,0,0,0.5)'">
      <div style="font-size: 0.8em; color: #888; margin-bottom: 5px;">← 上一篇</div>
      <div style="font-weight: bold; color: #00ffff;">{{ .Title }}</div>
    </a>
    {{ else }}
    <div style="flex: 1; min-width: 200px;"></div>
    {{ end }}
    
    {{ with .NextInSection }}
    <a href="{{ .RelPermalink }}" 
       style="
         flex: 1;
         min-width: 200px;
         padding: 15px 20px;
         background: rgba(0,0,0,0.5);
         border: 1px solid #333;
         border-radius: 10px;
         color: #fff;
         text-decoration: none;
         text-align: right;
         transition: all 0.3s ease;
       "
       onmouseover="this.style.borderColor='#00ffff'; this.style.background='rgba(0,255,255,0.1)'"
       onmouseout="this.style.borderColor='#333'; this.style.background='rgba(0,0,0,0.5)'">
      <div style="font-size: 0.8em; color: #888; margin-bottom: 5px;">下一篇 →</div>
      <div style="font-weight: bold; color: #00ffff;">{{ .Title }}</div>
    </a>
    {{ else }}
    <div style="flex: 1; min-width: 200px;"></div>
    {{ end }}
  </div>
</div>
{{ end }}
