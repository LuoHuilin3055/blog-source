<!-- 全局字体样式 -->
<style>
  body {
    font-family: "Comic Sans MS", "楷体", "KaiTi", "STKaiti", serif;
    line-height: 2;
  }

  /* 确保所有元素都使用这个字体设置 */
  * {
    font-family: inherit;
    line-height: inherit;
  }

  /* 标题字体可以保持特殊样式 */
  h1, h2, h3, h4, h5, h6 {
    font-family: "Comic Sans MS", "楷体", "KaiTi", "STKaiti", serif;
    line-height: 1.8;
  }

  /* 代码块使用等宽字体 */
  code, pre {
    font-family: "Consolas", "Monaco", "Courier New", monospace;
    line-height: 1.5;
  }

  /* 链接和按钮 */
  a, button {
    font-family: "Comic Sans MS", "楷体", "KaiTi", "STKaiti", serif;
  }

  /* 表单输入 */
  input, textarea, select {
    font-family: "Comic Sans MS", "楷体", "KaiTi", "STKaiti", serif;
  }

  /* 图片滑动容器 */
  .article-content .image-slider {
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-behavior: smooth;
    gap: 15px;
    padding: 10px 0;
    white-space: nowrap;
  }

  /* 隐藏滚动条但保持滚动功能 */
  .article-content .image-slider::-webkit-scrollbar {
    display: none;
  }

  .article-content .image-slider {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  /* 文章内容图片样式 */
  .article-content .image-slider img {
    flex-shrink: 0;
    width: 280px;
    height: 200px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  /* 鼠标悬停效果 */
  .article-content .image-slider img:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 30px rgba(0,255,255,0.3);
  }

  /* 滑动提示指示器 */
  .article-content .slider-hint {
    text-align: center;
    color: #888;
    font-size: 0.85em;
    margin-top: 5px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
</style>

<!-- 不蒜子网站统计 -->
<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<!-- 自定义统计脚本 -->
<script>
  // 不蒜子回调函数
  function busuanziCallback() {
    // 可以在这里处理统计数据
  }

  // 页面加载完成后执行
  window.addEventListener('load', function() {
    // 确保不蒜子脚本已加载
    if (typeof busuanzi !== 'undefined') {
      busuanziCallback();
    }
    
    // 为所有包含多张图片的段落添加滑动容器
    document.querySelectorAll('.article-content p').forEach(function(p) {
      var images = p.querySelectorAll('img');
      if (images.length > 1) {
        // 创建滑动容器
        var slider = document.createElement('div');
        slider.className = 'image-slider';
        
        // 将所有图片移到滑动容器中
        images.forEach(function(img) {
          slider.appendChild(img);
        });
        
        // 将滑动容器添加到段落中
        p.appendChild(slider);
        
        // 添加滑动提示
        var hint = document.createElement('div');
        hint.className = 'slider-hint';
        hint.textContent = '← 左右滑动查看更多图片 →';
        p.appendChild(hint);
      }
    });
  });
</script>
