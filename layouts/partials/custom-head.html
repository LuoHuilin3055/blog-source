<!-- 全局字体样式 -->
<style>
  body {
    font-family: "Comic Sans MS", "楷体", "KaiTi", "STKaiti", serif;
    line-height: 2;
  }
  
  /* 确保所有元素都使用这个字体设置 */
  * {
    font-family: inherit;
    line-height: inherit;
  }
  
  /* 标题字体可以保持特殊样式 */
  h1, h2, h3, h4, h5, h6 {
    font-family: "Comic Sans MS", "楷体", "KaiTi", "STKaiti", serif;
    line-height: 1.8;
  }
  
  /* 代码块使用等宽字体 */
  code, pre {
    font-family: "Consolas", "Monaco", "Courier New", monospace;
    line-height: 1.5;
  }
  
  /* 链接和按钮 */
  a, button {
    font-family: "Comic Sans MS", "楷体", "KaiTi", "STKaiti", serif;
  }
  
  /* 表单输入 */
  input, textarea, select {
    font-family: "Comic Sans MS", "楷体", "KaiTi", "STKaiti", serif;
  }
  
  /* 文章内容图片大小限制 */
  .article-content img {
    max-width: 100%;
    height: auto;
    max-height: 500px;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    margin: 10px 0;
  }
  
  /* 文章内容中的图片容器 */
  .article-content .figure {
    margin: 15px 0;
    text-align: center;
  }
</style>

<!-- 不蒜子网站统计 -->
<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<!-- 自定义统计脚本 -->
<script>
  // 不蒜子回调函数
  function busuanziCallback() {
    // 可以在这里处理统计数据
  }
  
  // 页面加载完成后执行
  window.addEventListener('load', function() {
    // 确保不蒜子脚本已加载
    if (typeof busuanzi !== 'undefined') {
      busuanziCallback();
    }
  });
</script>
