<!-- 公告卡片 -->
{{ if .Site.Params.announcement }}
<div style="
  background: #1a1d29;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  border: 1px solid #2a2d3a;
">
  <!-- 标题 -->
  <div style="
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
  ">
    <svg style="width: 20px; height: 20px; color: #e74c3c;" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
    </svg>
    <h4 style="
      color: #fff;
      font-size: 1.1em;
      margin: 0;
      font-weight: 500;
    ">公告</h4>
  </div>
  
  <!-- 公告内容 -->
  <div style="
    color: #aaa;
    font-size: 0.9em;
    line-height: 1.6;
  ">
    {{ .Site.Params.announcement | markdownify }}
  </div>
</div>
{{ end }}
