{{ $coverImage := .Params.cover | default "" }}

<article style="
  background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%);
  border-radius: 16px;
  border: 1px solid #222;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  cursor: pointer;
  display: flex;
  flex-direction: column;
" onmouseover="this.style.transform='translateY(-8px)'; this.style.borderColor='#00ffff'; this.style.boxShadow='0 20px 40px rgba(0,255,255,0.2)';"
   onmouseout="this.style.transform='translateY(0)'; this.style.borderColor='#222'; this.style.boxShadow='none'">
  
  <!-- 封面图片区域 -->
  {{ if $coverImage }}
  <div style="
    position: relative;
    height: 200px;
    overflow: hidden;
    background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
  ">
    <img 
      src="{{ $coverImage | absURL }}"
      alt="{{ .Title }}"
      loading="lazy"
      decoding="async"
      style="
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
      "
      onmouseover="this.style.transform='scale(1.1)'"
      onmouseout="this.style.transform='scale(1)'"
    />
    <!-- 渐变遮罩 -->
    <div style="
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.7) 100%);
    "></div>
  </div>
  {{ end }}
  
  <!-- 装饰条 -->
  <div style="
    height: 4px;
    background: linear-gradient(90deg, #00ffff, #0066ff);
    width: 100%;
  "></div>
  
  <div style="padding: 30px; flex: 1; display: flex; flex-direction: column;">
    <!-- 文章标题 -->
    <h2 style="
      font-size: 1.8em;
      margin: 0 0 15px;
      line-height: 1.3;
    ">
      <a href="{{ .Permalink }}" style="
        color: #fff;
        text-decoration: none;
        transition: color 0.3s;
      " onmouseover="this.style.color='#00ffff'" onmouseout="this.style.color='#fff'">
        {{ .Title }}
      </a>
    </h2>
    
    <!-- 文章元数据 -->
    <div style="
      display: flex;
      gap: 20px;
      color: #888;
      font-size: 0.85em;
      margin-bottom: 20px;
      flex-wrap: wrap;
    ">
      <span>📅 {{ .Date.Format "2006-01-02" }}</span>
      <span>📝 {{ partial "custom-wordcount.html" . }} 字</span>
      <span>⏱️ {{ .ReadingTime }} 分钟阅读</span>
    </div>
    
    <!-- 文章摘要 -->
    <div style="
      color: #aaa;
      line-height: 1.7;
      margin-bottom: 20px;
      font-size: 0.95em;
      flex: 1;
    ">
      {{ .Summary | plainify | truncate 120 }}
    </div>
    
    <!-- 文章标签 -->
    {{ partial "article-tags.html" . }}
    
    <!-- 阅读更多按钮 -->
    <a href="{{ .Permalink }}" style="
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: #00ffff;
      text-decoration: none;
      font-size: 0.9em;
      font-weight: 500;
      padding: 8px 0;
      border-bottom: 2px solid #00ffff;
      transition: all 0.3s;
      margin-top: auto;
    " onmouseover="this.style.gap='12px'; this.style.color='#fff';"
       onmouseout="this.style.gap='8px'; this.style.color='#00ffff';">
      阅读文章
      <span style="font-size: 1.2em;">→</span>
    </a>
  </div>
</article>
