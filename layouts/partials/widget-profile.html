<!-- 个人资料卡片 -->
<div style="
  background: #1a1d29;
  border-radius: 12px;
  padding: 30px 20px;
  margin-bottom: 20px;
  text-align: center;
  border: 1px solid #2a2d3a;
">
  <!-- 头像 -->
  <div style="
    width: 100px;
    height: 100px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 15px;
    border: 3px solid #3a5a8c;
  ">
    <img src="{{ .Site.Params.avatar | absURL }}" alt="Avatar" style="
      width: 100%;
      height: 100%;
      object-fit: cover;
    ">
  </div>
  
  <!-- 昵称 -->
  <h3 style="
    color: #fff;
    font-size: 1.5em;
    margin: 0 0 8px;
    font-weight: 500;
  ">{{ .Site.Params.author | default "博主" }}</h3>
  
  <!-- 个性签名 -->
  <p style="
    color: #888;
    font-size: 0.9em;
    margin: 0 0 20px;
  ">{{ .Site.Params.bio | default "Hi, there ~ 👋" }}</p>
  
  <!-- 统计信息 -->
  <div style="
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 20px;
  ">
    <div style="text-align: center;">
      <div style="color: #fff; font-size: 1.2em; font-weight: bold;">{{ len (where .Site.RegularPages "Type" "posts") }}</div>
      <div style="color: #888; font-size: 0.8em;">文章</div>
    </div>
    <div style="text-align: center;">
      <div style="color: #fff; font-size: 1.2em; font-weight: bold;">{{ len .Site.Taxonomies.tags }}</div>
      <div style="color: #888; font-size: 0.8em;">标签</div>
    </div>
  </div>
  
  <!-- Follow Me 按钮 -->
  {{ if .Site.Params.github }}
  <a href="{{ .Site.Params.github }}" target="_blank" style="
    display: block;
    background: #3a5a8c;
    color: #fff;
    padding: 12px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 500;
    transition: background 0.3s;
  " onmouseover="this.style.background='#4a6a9c'" onmouseout="this.style.background='#3a5a8c'">
    <span style="display: inline-flex; align-items: center; gap: 8px;">
      <svg style="width: 18px; height: 18px;" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
      </svg>
      Follow Me
    </span>
  </a>
  {{ end }}
</div>
