{{ if .TableOfContents }}
<div style="
  width: 280px;
  position: sticky;
  top: 80px;
  background: rgba(0,0,0,0.9);
  border-radius: 12px;
  padding: 20px;
  border: 1px solid rgba(0,255,255,0.3);
  max-height: 80vh;
  overflow-y: auto;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  transition: all 0.3s ease;
  z-index: 10;
  min-width: 280px;
" id="toc-container">
  <div style="
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(0,255,255,0.2);
  ">
    <h3 style="color: #00ffff; margin: 0; font-size: 1.1em;">📋 目录</h3>
    <button 
      onclick="toggleTOC()"
      style="
        background: transparent;
        border: 1px solid rgba(0,255,255,0.3);
        color: #00ffff;
        padding: 4px 8px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.85em;
        transition: all 0.3s ease;
      "
      onmouseover="this.style.background='rgba(0,255,255,0.2)'"
      onmouseout="this.style.background='transparent'">
      收起
    </button>
  </div>
  
  <div class="enhanced-toc" style="
    transition: max-height 0.3s ease, opacity 0.3s ease;
    max-height: 1000px;
    opacity: 1;
    overflow: hidden;
  " id="toc-content">
    {{ .TableOfContents }}
  </div>
</div>

<style>
  .enhanced-toc ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
  }
  
  .enhanced-toc li {
    margin: 8px 0;
    position: relative;
  }
  
  .enhanced-toc li::before {
    content: '';
    position: absolute;
    left: -15px;
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: 6px;
    background: rgba(0,255,255,0.5);
    border-radius: 50%;
    transition: all 0.3s ease;
  }
  
  .enhanced-toc li:hover::before {
    background: #00ffff;
    transform: translateY(-50%) scale(1.3);
  }
  
  .enhanced-toc a {
    color: #ccc;
    text-decoration: none;
    transition: all 0.3s ease;
    display: block;
    padding: 4px 0;
    font-size: 0.9em;
    line-height: 1.5;
  }
  
  .enhanced-toc a:hover {
    color: #00ffff;
    padding-left: 8px;
  }
  
  .enhanced-toc a.active {
    color: #00ffff;
    font-weight: bold;
    padding-left: 8px;
  }
  
  .enhanced-toc a.active::before {
    content: '▸';
    margin-right: 5px;
  }
  
  .enhanced-toc ul ul {
    padding-left: 20px;
    margin-top: 8px;
    border-left: 2px solid rgba(0,255,255,0.2);
  }
  
  .enhanced-toc ul ul li {
    margin: 6px 0;
  }
  
  .enhanced-toc ul ul li::before {
    left: -12px;
    width: 4px;
    height: 4px;
  }
  
  /* 滚动条样式 */
  #toc-container::-webkit-scrollbar {
    width: 6px;
  }
  
  #toc-container::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.3);
    border-radius: 3px;
  }
  
  #toc-container::-webkit-scrollbar-thumb {
    background: rgba(0,255,255,0.3);
    border-radius: 3px;
  }
  
  #toc-container::-webkit-scrollbar-thumb:hover {
    background: rgba(0,255,255,0.5);
  }
  
  /* 响应式设计 */
  @media (max-width: 1024px) {
    #toc-container {
      width: 100%;
      max-width: 400px;
      margin: 0 auto 30px;
      position: relative;
      top: 0;
    }
  }
</style>

<script>
  let tocCollapsed = false;
  
  function toggleTOC() {
    const tocContent = document.getElementById('toc-content');
    const button = event.target;
    
    if (tocCollapsed) {
      tocContent.style.maxHeight = '1000px';
      tocContent.style.opacity = '1';
      button.textContent = '收起';
    } else {
      tocContent.style.maxHeight = '0';
      tocContent.style.opacity = '0';
      button.textContent = '展开';
    }
    
    tocCollapsed = !tocCollapsed;
  }
  
  // 高亮当前章节
  document.addEventListener('DOMContentLoaded', function() {
    const headings = document.querySelectorAll('h1, h2, h3, h4, h5, h6');
    const tocLinks = document.querySelectorAll('.enhanced-toc a');
    
    if (headings.length === 0 || tocLinks.length === 0) return;
    
    const observerOptions = {
      root: null,
      rootMargin: '-10% 0px -80% 0px',
      threshold: 0
    };
    
    const observer = new IntersectionObserver(function(entries) {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.getAttribute('id');
          tocLinks.forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('href') === '#' + id) {
              link.classList.add('active');
              // 移除 scrollIntoView 避免页面反弹
              // link.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
          });
        }
      });
    }, observerOptions);
    
    headings.forEach(heading => {
      if (heading.getAttribute('id')) {
        observer.observe(heading);
      }
    });
  });
</script>
{{ end }}
