{{ $friends := .Site.Data.friends }}

{{ if $friends }}
<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px;">
  {{ range $friends }}
  <div style="
    background: rgba(0,0,0,0.7);
    border-radius: 12px;
    padding: 20px;
    border: 1px solid rgba(0,255,255,0.3);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  " onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 12px 40px rgba(0,255,255,0.6)'; this.style.borderColor='#00ffff'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 8px 32px rgba(0,0,0,0.5)'; this.style.borderColor='rgba(0,255,255,0.3)'">
    <div style="margin-bottom: 15px;">
      <img 
        src="{{ .avatar }}" 
        alt="{{ .name }}" 
        style="
          width: 80px;
          height: 80px;
          border-radius: 50%;
          object-fit: cover;
          border: 2px solid rgba(0,255,255,0.5);
          box-shadow: 0 4px 15px rgba(0,255,255,0.3);
        "
      />
    </div>
    <h3 style="color: #00ffff; margin: 0 0 10px; font-size: 1.2em;">{{ .name }}</h3>
    <p style="color: #ccc; margin: 0 0 15px; font-size: 0.9em; line-height: 1.4;">{{ .description }}</p>
    <a 
      href="{{ .url }}" 
      target="_blank" 
      rel="noopener noreferrer"
      style="
        background: linear-gradient(135deg, rgba(0,255,255,0.2), rgba(0,255,255,0.1));
        border: 1px solid rgba(0,255,255,0.4);
        color: #00ffff;
        padding: 8px 16px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 0.9em;
        transition: all 0.3s ease;
        display: inline-block;
      "
      onmouseover="this.style.background='linear-gradient(135deg, rgba(0,255,255,0.3), rgba(0,255,255,0.2))'; this.style.borderColor='#00ffff'; this.style.boxShadow='0 4px 12px rgba(0,255,255,0.3)'; this.style.transform='translateY(-2px)'"
      onmouseout="this.style.background='linear-gradient(135deg, rgba(0,255,255,0.2), rgba(0,255,255,0.1))'; this.style.borderColor='rgba(0,255,255,0.4)'; this.style.boxShadow='none'; this.style.transform='translateY(0)'"
    >
      访问网站
    </a>
  </div>
  {{ end }}
</div>
{{ else }}
<div style="text-align: center; padding: 40px 20px; color: #ccc;">
  <p>暂无友链，欢迎添加！</p>
</div>
{{ end }}
