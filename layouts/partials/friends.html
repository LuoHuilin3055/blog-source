{{ $friends := .Site.Data.friends }}

{{ if $friends }}
<div style="display: flex; flex-wrap: wrap; gap: 30px; margin-top: 30px; justify-content: center;">
  {{ range $friends }}
  <a 
    href="{{ .url }}" 
    target="_blank" 
    rel="noopener noreferrer"
    style="
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      transition: all 0.3s ease;
      padding: 15px;
      border-radius: 50%;
    "
    onmouseover="this.style.transform='translateY(-5px)'; this.querySelector('img').style.boxShadow='0 6px 20px rgba(0,255,255,0.8)'; this.querySelector('img').style.borderColor='#00ffff'"
    onmouseout="this.style.transform='translateY(0)'; this.querySelector('img').style.boxShadow='0 4px 15px rgba(0,255,255,0.3)'; this.querySelector('img').style.borderColor='rgba(0,255,255,0.5)'"
  >
    <div style="margin-bottom: 10px;">
      <img 
        src="{{ .avatar }}" 
        alt="{{ .name }}" 
        style="
          width: 100px;
          height: 100px;
          border-radius: 50%;
          object-fit: cover;
          border: 2px solid rgba(0,255,255,0.5);
          box-shadow: 0 4px 15px rgba(0,255,255,0.3);
          transition: all 0.3s ease;
        "
      />
    </div>
    <h3 style="color: #00ffff; margin: 0 0 5px; font-size: 1em; text-align: center;">{{ .name }}</h3>
    <p style="color: #ccc; margin: 0; font-size: 0.8em; text-align: center; max-width: 100px;">{{ .description }}</p>
  </a>
  {{ end }}
</div>
{{ else }}
<div style="text-align: center; padding: 40px 20px; color: #ccc;">
  <p>暂无友链，欢迎添加！</p>
</div>
{{ end }}
