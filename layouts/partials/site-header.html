<header style="background: transparent; padding: 20px 0; position: absolute; top: 0; left: 0; right: 0; z-index: 100;">
    <nav style="max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center;">
        <!-- 左上角博客标题 -->
        <a href="/" style="color: #00ffff; font-size: 1.5em; text-decoration: none; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
            {{ .Site.Title }}
        </a>
        <!-- 右上角导航菜单 -->
        <div style="display: flex; gap: 30px;">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}" style="color: white; text-decoration: none; font-size: 1.1em; transition: color 0.3s; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);" 
               onmouseover="this.style.color='#00ffff'" 
               onmouseout="this.style.color='white'">
                {{ .Name }}
            </a>
            {{ end }}
        </div>
    </nav>
</header>
