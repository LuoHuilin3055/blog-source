<header style="background: transparent; padding: 20px 0; position: absolute; top: 0; left: 0; right: 0; z-index: 100;">
    <nav style="max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center;">
        <!-- 左上角博客标题 -->
        <a href="{{ "" | absURL }}" style="color: #00ffff; font-size: 1.5em; text-decoration: none; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
            {{ .Site.Title }}
        </a>
        <!-- 右上角导航菜单 -->
        <div style="display: flex; gap: 30px; align-items: center;">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL | absURL }}" style="color: white; text-decoration: none; font-size: 1.1em; transition: color 0.3s; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);" 
               onmouseover="this.style.color='#00ffff'" 
               onmouseout="this.style.color='white'">
                {{ .Name }}
            </a>
            {{ end }}
            
            <!-- 页面标签 -->
            <a href="{{ "tags" | absURL }}" style="color: white; text-decoration: none; font-size: 1.1em; transition: color 0.3s; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);" 
               onmouseover="this.style.color='#00ffff'" 
               onmouseout="this.style.color='white'">
                标签
            </a>
            
            <!-- 归档 -->
            <a href="{{ "categories" | absURL }}" style="color: white; text-decoration: none; font-size: 1.1em; transition: color 0.3s; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);" 
               onmouseover="this.style.color='#00ffff'" 
               onmouseout="this.style.color='white'">
                归档
            </a>
            
            <!-- 搜索 -->
            <div style="position: relative;">
                <input type="text" id="search-input" placeholder="搜索..." 
                       style="
                         background: rgba(0,0,0,0.7);
                         border: 1px solid rgba(0,255,255,0.3);
                         border-radius: 20px;
                         padding: 6px 12px;
                         color: #fff;
                         font-size: 0.9em;
                         backdrop-filter: blur(5px);
                         transition: all 0.3s ease;
                       " 
                       onfocus="this.style.borderColor='#00ffff'; this.style.boxShadow='0 0 10px rgba(0,255,255,0.3)'; document.getElementById('search-results').style.display='block'"
                       onblur="setTimeout(function() { document.getElementById('search-results').style.display='none'; }, 200)"
                       onkeyup="performSearch(this.value)" />
                <button style="
                  position: absolute;
                  right: 8px;
                  top: 50%;
                  transform: translateY(-50%);
                  background: transparent;
                  border: none;
                  color: #00ffff;
                  cursor: pointer;
                  font-size: 1em;
                " onclick="performSearch(document.getElementById('search-input').value)">🔍</button>
                
                <!-- 搜索结果 -->
                <div id="search-results" style="
                  position: absolute;
                  top: 100%;
                  right: 0;
                  width: 300px;
                  max-height: 300px;
                  background: rgba(0,0,0,0.9);
                  border: 1px solid rgba(0,255,255,0.3);
                  border-radius: 10px;
                  padding: 10px;
                  margin-top: 5px;
                  display: none;
                  overflow-y: auto;
                  z-index: 1000;
                  backdrop-filter: blur(10px);
                "></div>
            </div>
        </div>
    </nav>
</header>

<script>
  // 搜索数据
  const searchData = [
    {{ range .Site.RegularPages }}
    {
      title: "{{ .Title }}",
      url: "{{ .Permalink }}",
      content: "{{ .Content | plainify | truncate 200 }}",
      date: "{{ .Date.Format "2006-01-02" }}",
      tags: [{{ range .Params.tags }} "{{ . }}", {{ end }}]
    },
    {{ end }}
  ];
  
  function performSearch(query) {
    const resultsContainer = document.getElementById('search-results');
    
    if (!query.trim()) {
      resultsContainer.innerHTML = '';
      return;
    }
    
    // 模糊搜索
    const results = searchData.filter(item => {
      const searchTerm = query.toLowerCase();
      return item.title.toLowerCase().includes(searchTerm) || 
             item.content.toLowerCase().includes(searchTerm) ||
             item.tags.some(tag => tag.toLowerCase().includes(searchTerm));
    });
    
    // 显示搜索结果
    if (results.length > 0) {
      resultsContainer.innerHTML = results.map(item => `
        <a href="${item.url}" style="
          display: block;
          padding: 12px;
          color: #fff;
          text-decoration: none;
          border-radius: 5px;
          transition: all 0.3s ease;
          margin-bottom: 8px;
        " onmouseover="this.style.background='rgba(0,255,255,0.1)'; this.style.color='#00ffff'" onmouseout="this.style.background='none'; this.style.color='#fff'">
          <div style="font-weight: bold; margin-bottom: 5px; font-size: 1em;">${item.title}</div>
          <div style="font-size: 0.8em; color: #aaa; margin-bottom: 5px;">${item.date}</div>
          ${item.tags.length > 0 ? `<div style="font-size: 0.7em; color: #00ffff; display: flex; flex-wrap: wrap; gap: 4px;">${item.tags.map(tag => `<span style="background: rgba(0,255,255,0.1); padding: 2px 8px; border-radius: 10px;">${tag}</span>`).join('')}</div>` : ''}
        </a>
      `).join('');
    } else {
      resultsContainer.innerHTML = `
        <div style="padding: 20px; text-align: center; color: #aaa;">
          没有找到相关内容
        </div>
      `;
    }
  }
  
  // 点击外部关闭搜索结果
  document.addEventListener('click', function(e) {
    const searchContainer = document.querySelector('div[style*="position: relative;"]');
    const searchResults = document.getElementById('search-results');
    
    if (searchContainer && !searchContainer.contains(e.target)) {
      searchResults.style.display = 'none';
    }
  });
</script>
