<footer style="background-color: #000; padding: 20px; position: relative; bottom: 0; width: 100%;" role="contentinfo">
  <style>
    .ananke-socials a {
      color: #fff !important;
    }
    .ananke-socials a:hover {
      color: #00ffff !important;
    }
  </style>
  <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
    <a href="{{ .Site.Home.Permalink }}" style="color: #fff; font-size: 1rem; text-decoration: none; padding: 10px 15px; transition: all 0.3s ease;" onmouseover="this.style.color='#00ffff'" onmouseout="this.style.color='#fff'">
      &copy; {{ with .Site.Copyright | compare.Default .Site.Title }} {{ . | safe.HTML }} {{ now.Format "2006"}} {{ end }}
    </a>
    <div>{{ partials.IncludeCached "social/follow.html" . }}</div>
  </div>
</footer>
