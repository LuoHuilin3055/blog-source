{{ $image := "images/background.jpg" | absURL }}
{{ $title := .Site.Params.site_title | default "NGC 2237" }}
{{ $description := .Site.Params.description }}

<div style="
  background-image: url('{{ $image }}');
  background-size: cover;
  background-position: center;
  height: 900px;
  width: 100vw;           /* 改为视口宽度 */
  position: relative;
  margin-left: calc(-50vw + 50%);  /* 居中偏移 */
  left: 0;
  right: 0;
">
  <div style="
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(0, 0, 0, 0.3);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  ">
    <h1 style="
      color: white;
      font-size: 5em;
      margin: 0;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
      font-weight: bold;
    ">{{ $title }}</h1>
    
    {{ if $description }}
    <p style="
      color: white;
      font-size: 2.2em;
      margin: 20px 0 0;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    ">{{ $description }}</p>
    {{ end }}
  </div>
</div>
