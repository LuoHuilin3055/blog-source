<!-- 友链组件 -->
<div style="
  background: linear-gradient(135deg, #1a1d29 0%, #151720 100%);
  border: 1px solid #2a2d3a;
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
">
  <!-- 标题 -->
  <div style="
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
    padding-bottom: 15px;
    border-bottom: 1px solid #2a2d3a;
  ">
    <span style="font-size: 1.3em;">🔗</span>
    <h3 style="color: #00ffff; font-size: 1.2em; margin: 0;">友情链接</h3>
  </div>
  
  <!-- 友链列表 -->
  <div style="display: flex; flex-direction: column; gap: 12px;">
    {{ if .Site.Data.friends }}
      {{ range .Site.Data.friends }}
        <a href="{{ .url }}" target="_blank" rel="noopener noreferrer" style="
          display: flex;
          align-items: center;
          gap: 12px;
          padding: 10px;
          border-radius: 10px;
          background: rgba(0,255,255,0.05);
          text-decoration: none;
          transition: all 0.3s ease;
        " onmouseover="this.style.background='rgba(0,255,255,0.15)'; this.style.transform='translateX(5px)';"
           onmouseout="this.style.background='rgba(0,255,255,0.05)'; this.style.transform='translateX(0)';">
          <!-- 头像 -->
          <div style="
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #00ffff;
            flex-shrink: 0;
          ">
            <img src="{{ .avatar }}" alt="{{ .name }}" style="
              width: 100%;
              height: 100%;
              object-fit: cover;
            ">
          </div>
          
          <!-- 信息 -->
          <div style="flex: 1; min-width: 0;">
            <div style="color: #fff; font-size: 0.95em; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
              {{ .name }}
            </div>
            <div style="color: #888; font-size: 0.75em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
              {{ .description }}
            </div>
          </div>
        </a>
      {{ end }}
    {{ else }}
      <div style="color: #888; text-align: center; padding: 20px;">暂无友链</div>
    {{ end }}
  </div>
</div>
