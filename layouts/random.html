<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <title>随机文章 | NGC 2237&#39;s Blog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            --primary-color: #00ffff;
            --secondary-color: #a5b4fc;
            --bg-primary: #000000;
            --bg-secondary: #1e293b;
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            width: 100%;
            font-family: var(--font-sans);
            line-height: 1.6;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <header style="background: transparent; padding: 20px 0; position: absolute; top: 0; left: 0; right: 0; z-index: 100;">
        <nav style="max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center;">
            <a href="{{ .Site.BaseURL }}" style="color: #00ffff; font-size: 1.5em; text-decoration: none; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
                NGC 2237&#39;s Blog
            </a>
        </nav>
    </header>

    <main style="background-color: var(--bg-primary);">
        <div style="
            background-image: url('{{ .Site.BaseURL }}/images/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 120px 20px 60px;
            background-color: #000000;
            position: relative;
        ">
            <div style="
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.7);
                z-index: 0;
            "></div>
            <div style="max-width: 1400px; margin: 0 auto; display: flex; gap: 40px; position: relative; z-index: 1;">
                <article style="flex: 1; background: rgba(0,0,0,0.7); border-radius: 15px; padding: 40px; border: 1px solid rgba(0,255,255,0.3); backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); transition: all 0.3s ease; transform: translateY(0);">
                    <h1 style="color: #00ffff; font-size: clamp(2em, 5vw, 2.5em); margin: 0 0 20px; text-shadow: 0 0 10px rgba(0,255,255,0.3); animation: fadeIn 0.8s ease;">随机文章</h1>
                    <div class="article-content" style="color: #fff; line-height: 1.8; margin-top: 30px;">
                        <p>正在跳转到随机文章&hellip;</p>
                    </div>
                </article>
            </div>
        </div>
    </main>

    <footer style="background-color: #000; padding: 20px; position: relative; bottom: 0; width: 100%;" role="contentinfo">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
            <a href="{{ .Site.BaseURL }}" style="color: #fff; font-size: 1rem; text-decoration: none; padding: 10px 15px; transition: all 0.3s ease;" onmouseover="this.style.color='#00ffff'" onmouseout="this.style.color='#fff'">
                &copy;  NGC 2237's Blog {{ now.Format "2006" }}
            </a>
        </div>
    </footer>

    <script>
        // 文章列表 - 自动生成，只包含正式发布的文章，不包含草稿
        const posts = [
            {{ range where .Site.RegularPages "Type" "posts" }}
            "{{ .RelPermalink }}",
            {{ end }}
        ];
        
        // 随机选择一篇文章
        const randomPost = posts[Math.floor(Math.random() * posts.length)];
        
        // 重定向到随机文章
        window.location.href = randomPost;
    </script>
</body>
</html>
